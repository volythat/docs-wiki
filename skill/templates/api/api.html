<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>API</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; color: #1a1a1a; }
  .layout { display: flex; }
  nav { width: 240px; border-right: 1px solid #e5e5e5; padding: 16px; position: sticky;
        top: 0; height: 100vh; overflow: auto; }
  nav a { display: block; padding: 4px 0; color: #2563eb; text-decoration: none; }
  main { flex: 1; padding: 24px 32px; max-width: 820px; }
  .endpoint { border: 1px solid #e5e5e5; border-radius: 8px; padding: 16px; margin: 16px 0; }
  .method { font-weight: 700; font-family: monospace; padding: 2px 8px; border-radius: 4px;
            background: #ecfdf5; color: #047857; }
  pre { background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 6px; overflow: auto; }
  h3 { margin-top: 0; }
</style>
</head>
<body>
<div class="layout">
  <nav id="toc">
    <strong>Mục lục</strong>
    <a href="#create-order">Tạo đơn hàng</a>
  </nav>
  <main>
    <h1>Tài liệu API</h1>

    <section class="endpoint" id="create-order"
             data-method="POST" data-path="/orders" data-auth="bearer" data-seq="1">
      <h3><span class="method">POST</span> /orders — Tạo đơn hàng</h3>
      <p class="desc">Tạo một đơn hàng mới từ giỏ hàng hiện tại.</p>

      <div class="headers">
        <div class="header" data-key="Content-Type" data-value="application/json"></div>
      </div>

      <h4>Request body</h4>
      <pre class="request-body" data-ref="data-model.md#order"><code>{
  "items": [{ "productId": "string", "qty": 0 }],
  "note": "string"
}</code></pre>

      <h4>Response 201</h4>
      <pre class="response" data-status="201"><code>{
  "id": "string",
  "status": "pending"
}</code></pre>
    </section>
  </main>
</div>
</body>
</html>
